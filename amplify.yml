version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Node 22(对齐 .nvmrc);Amplify 构建镜像自带 nvm
        - nvm use 22 || nvm install 22
        # packageManager 已钉 pnpm@11.4.0，corepack 自动用对应版本
        - corepack enable
        # nonprod/prod 分支:setup-npmrc 走公共 npm(只有 develop 才用 CodeArtifact 私有源)，
        # 故无需任何 registry token；--frozen-lockfile 装已发布的公共 SDK
        - pnpm install --frozen-lockfile
    build:
      # pnpm build 会先跑 prebuild(setup-npmrc，非 develop 分支为 no-op)再 vitepress build
      commands:
        - pnpm build
  artifacts:
    # vitepress build 默认输出到 .vitepress/dist
    baseDirectory: .vitepress/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .vitepress/cache/**/*
